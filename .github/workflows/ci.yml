name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: markdownlint '**/*.md' --config .markdownlint.json --ignore '.github/**/*.md'

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: lychee-cache-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 21d
            --no-progress
            --exclude 'https://www.gherkineditor.com'
            --exclude 'https://productive.me/develop/cucumbergherkin-syntax-highlighting-for-notepad'
            --exclude 'https://www.youtube.com/results'
            --exclude 'https://www.lambdatest.com/'
            --exclude 'https://www.udemy.com/'
            --exclude 'https://star-history.com/'
            --exclude 'https://behave.readthedocs.io/en/stable/flask/'
            '*.md'
          fail: true

  awesome-lint:
    name: Awesome List Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate awesome-list format
        run: python scripts/validate_readme.py README.md

      - name: Validate alphabetical order
        run: python scripts/check_alphabetical.py README.md
